<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Statistiques</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        .container {
            width: 88%;
            margin: 35px auto;
        }

        h2 {
            text-align: center;
            color: #1e3a8a;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: flex;
            justify-content: center;
            gap: 22px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            width: 260px;
            padding: 25px;
            text-align: center;
            border-radius: 14px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }

        .card h3 {
            color: #2563eb;
            margin-bottom: 12px;
        }

        .card p {
            font-size: 30px;
            font-weight: bold;
            margin: 0;
            color: #111827;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 28px;
            text-decoration: none;
            color: #1e3a8a;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div th:replace="fragments/header :: header"></div>
<div th:replace="fragments/menu :: menu"></div>

<div class="container">
    <h2>Tableau de bord - Statistiques</h2>

    <div class="stats-grid">
        <div class="card">
            <h3>Nombre de cours</h3>
            <p th:text="${nbCoursSemaine}"></p>
        </div>

        <div class="card">
            <h3>Instruments disponibles</h3>
            <p th:text="${nbInstrumentsDisponibles}"></p>
        </div>

        <div class="card">
            <h3>Instruments indisponibles</h3>
            <p th:text="${nbInstrumentsIndisponibles}"></p>
        </div>
    </div>

    <a class="back-link" th:href="@{/}">← Retour à l’accueil</a>
</div>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
