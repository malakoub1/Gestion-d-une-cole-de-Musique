<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Liste des professeurs</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f8fafc;
        }

        .container {
            width: 90%;
            margin: 30px auto;
        }

        h2 {
            color: #1e3a8a;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn {
            background: #2563eb;
            color: white;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: bold;
        }

        .btn:hover {
            background: #1d4ed8;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 3px 12px rgba(0,0,0,0.06);
        }

        th, td {
            padding: 14px;
            text-align: center;
            border-bottom: 1px solid #e5e7eb;
        }

        th {
            background: #1e3a8a;
            color: white;
        }

        tr:hover {
            background: #f9fafb;
        }

        .action {
            text-decoration: none;
            font-weight: bold;
            margin: 0 6px;
        }

        .edit {
            color: #2563eb;
        }

        .delete {
            color: #dc2626;
        }

        .back-link {
            display: inline-block;
            margin-top: 18px;
            text-decoration: none;
            color: #1e3a8a;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div th:replace="fragments/header :: header"></div>
<div th:replace="fragments/menu :: menu"></div>

<div class="container">
    <div class="top-bar">
        <h2>Liste des professeurs</h2>
        <a class="btn" th:href="@{/profs/new}">+ Ajouter un professeur</a>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Nom</th>
            <th>Spécialité</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="prof : ${profs}">
            <td th:text="${prof.id}"></td>
            <td th:text="${prof.nom}"></td>
            <td th:text="${prof.specialite}"></td>
            <td>
                <a class="action edit" th:href="@{/profs/edit/{id}(id=${prof.id})}">Modifier</a>
                <a class="action delete"
                   th:href="@{/profs/delete/{id}(id=${prof.id})}"
                   onclick="return confirm('Voulez-vous vraiment supprimer ce professeur ?')">
                    Supprimer
                </a>
            </td>
        </tr>
        </tbody>
    </table>

    <a class="back-link" th:href="@{/}">← Retour à l’accueil</a>
</div>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
