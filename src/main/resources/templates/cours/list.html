<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Liste des cours</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f8fafc;
        }

        .container {
            width: 94%;
            margin: 30px auto;
        }

        h2 {
            color: #1e3a8a;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn {
            background: #2563eb;
            color: white;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: bold;
        }

        .btn:hover {
            background: #1d4ed8;
        }

        .filter-box {
            background: white;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.06);
        }

        .filter-box input,
        .filter-box button {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            margin-right: 8px;
        }

        .filter-box button {
            background: #0f172a;
            color: white;
            border: none;
            cursor: pointer;
        }

        .filter-box button:hover {
            background: #1e293b;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 3px 12px rgba(0,0,0,0.06);
        }

        th, td {
            padding: 14px;
            text-align: center;
            border-bottom: 1px solid #e5e7eb;
        }

        th {
            background: #1e3a8a;
            color: white;
        }

        tr:hover {
            background: #f9fafb;
        }

        .action {
            text-decoration: none;
            font-weight: bold;
            margin: 0 6px;
        }

        .edit {
            color: #2563eb;
        }

        .delete {
            color: #dc2626;
        }

        .back-link {
            display: inline-block;
            margin-top: 18px;
            text-decoration: none;
            color: #1e3a8a;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div th:replace="fragments/header :: header"></div>
<div th:replace="fragments/menu :: menu"></div>

<div class="container">
    <div class="top-bar">
        <h2>Liste des cours</h2>
        <a class="btn" th:href="@{/cours/new}">+ Ajouter un cours</a>
    </div>

    <div class="filter-box">
        <form th:action="@{/cours}" method="get">
            <input type="text" name="niveau" placeholder="Niveau" th:value="${niveau}">
            <input type="text" name="jour" placeholder="Jour" th:value="${jour}">
            <button type="submit">Filtrer</button>
        </form>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Jour</th>
            <th>Heure début</th>
            <th>Durée (min)</th>
            <th>Niveau</th>
            <th>Professeur</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="cours : ${coursList}">
            <td th:text="${cours.id}"></td>
            <td th:text="${cours.jour}"></td>
            <td th:text="${cours.heureDebut}"></td>
            <td th:text="${cours.dureeMin}"></td>
            <td th:text="${cours.niveau}"></td>
            <td th:text="${cours.prof != null ? cours.prof.nom : 'Non affecté'}"></td>
            <td>
                <a class="action edit" th:href="@{/cours/edit/{id}(id=${cours.id})}">Modifier</a>
                <a class="action delete"
                   th:href="@{/cours/delete/{id}(id=${cours.id})}"
                   onclick="return confirm('Voulez-vous vraiment supprimer ce cours ?')">
                    Supprimer
                </a>
            </td>
        </tr>
        </tbody>
    </table>

    <a class="back-link" th:href="@{/}">← Retour à l’accueil</a>
</div>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
