<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Formulaire Cours</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f8fafc;
        }

        .container {
            width: 560px;
            margin: 35px auto;
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }

        h2 {
            text-align: center;
            color: #1e3a8a;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-top: 14px;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 11px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            margin-top: 22px;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            text-decoration: none;
            color: #1e3a8a;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div th:replace="fragments/header :: header"></div>
<div th:replace="fragments/menu :: menu"></div>

<div class="container">
    <h2 th:text="${cours.id == null} ? 'Ajouter un cours' : 'Modifier un cours'"></h2>

    <form th:action="@{/cours/save}" th:object="${cours}" method="post">
        <input type="hidden" th:field="*{id}">

        <label for="jour">Jour</label>
        <input id="jour" type="text" th:field="*{jour}" placeholder="Ex: Lundi" required>

        <label for="heureDebut">Heure de début</label>
        <input id="heureDebut" type="time" th:field="*{heureDebut}" required>

        <label for="dureeMin">Durée (minutes)</label>
        <input id="dureeMin" type="number" th:field="*{dureeMin}" required>

        <label for="niveau">Niveau</label>
        <input id="niveau" type="text" th:field="*{niveau}" placeholder="Débutant, Intermédiaire..." required>

        <label for="profId">Professeur</label>
        <select id="profId" name="profId" required>
            <option value="">-- Choisir un professeur --</option>
            <option th:each="prof : ${profs}"
                    th:value="${prof.id}"
                    th:text="${prof.nom + ' - ' + prof.specialite}"
                    th:selected="${cours.prof != null and cours.prof.id == prof.id}">
            </option>
        </select>

        <button type="submit">Enregistrer</button>
    </form>

    <a class="back-link" th:href="@{/cours}">← Retour à la liste</a>
</div>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
