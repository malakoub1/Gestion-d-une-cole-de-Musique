<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Liste des instruments</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8fafc;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 90%;
            margin: 30px auto;
        }

        h1 {
            color: #1e3a8a;
        }

        .top-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        a.btn, button {
            background: #2563eb;
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }

        a.btn:hover, button:hover {
            background: #1d4ed8;
        }

        form {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        input, select {
            padding: 10px;
            margin-right: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        th, td {
            padding: 14px;
            border-bottom: 1px solid #eee;
            text-align: center;
        }

        th {
            background: #1e3a8a;
            color: white;
        }

        .action-link {
            text-decoration: none;
            margin: 0 5px;
            color: #2563eb;
            font-weight: bold;
        }

        .action-link.delete {
            color: #dc2626;
        }

        .back {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #1e3a8a;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-actions">
        <h1>Liste des instruments</h1>
        <a class="btn" th:href="@{/instruments/new}">+ Ajouter un instrument</a>
    </div>

    <form th:action="@{/instruments}" method="get">
        <input type="text" name="famille" placeholder="Famille" th:value="${famille}">
        <select name="disponibilite">
            <option value="">-- Disponibilité --</option>
            <option value="true" th:selected="${disponibilite == true}">Disponible</option>
            <option value="false" th:selected="${disponibilite == false}">Indisponible</option>
        </select>
        <button type="submit">Filtrer</button>
    </form>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Nom</th>
            <th>Famille</th>
            <th>Disponibilité</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="instrument : ${instruments}">
            <td th:text="${instrument.id}"></td>
            <td th:text="${instrument.nom}"></td>
            <td th:text="${instrument.famille}"></td>
            <td th:text="${instrument.disponibilite ? 'Disponible' : 'Indisponible'}"></td>
            <td>
                <a class="action-link" th:href="@{/instruments/edit/{id}(id=${instrument.id})}">Modifier</a>
                <a class="action-link delete" th:href="@{/instruments/delete/{id}(id=${instrument.id})}"
                   onclick="return confirm('Voulez-vous vraiment supprimer cet instrument ?')">Supprimer</a>
            </td>
        </tr>
        </tbody>
    </table>

    <a class="back" th:href="@{/}">← Retour à l’accueil</a>
</div>

</body>
</html>
